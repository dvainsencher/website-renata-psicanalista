<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página não encontrada — Renata Druck</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background-color: hsl(30 50% 96%);
        color: hsl(20 10% 16%);
        font-family: 'Montserrat', sans-serif;
        font-weight: 300;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
        -webkit-font-smoothing: antialiased;
      }

      .dot-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 2.5rem;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background-color: hsl(0 26% 71% / 0.4);
      }

      h1 {
        font-family: 'Cormorant Garamond', serif;
        font-size: clamp(2.5rem, 8vw, 4.5rem);
        font-weight: 300;
        line-height: 1.2;
        color: hsl(338 48% 55%);
        font-style: italic;
        margin-bottom: 1.5rem;
      }

      p {
        font-size: 1rem;
        font-weight: 300;
        color: hsl(20 8% 40%);
        line-height: 1.8;
        max-width: 28rem;
        margin-bottom: 2.5rem;
      }

      a {
        display: inline-block;
        border-radius: 9999px;
        background-color: hsl(0 26% 71%);
        color: hsl(30 50% 96%);
        font-family: 'Montserrat', sans-serif;
        font-size: 0.875rem;
        font-weight: 400;
        letter-spacing: 0.05em;
        padding: 0.875rem 2rem;
        text-decoration: none;
        transition: filter 0.2s;
      }

      a:hover { filter: brightness(1.05); }

      footer {
        margin-top: 4rem;
        font-size: 0.75rem;
        color: hsl(20 8% 40%);
      }
    </style>
  </head>
  <body>
    <div class="dot-row">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
    <h1>Página não encontrada.</h1>
    <p>O endereço que você acessou não existe.<br />Volte para o início e encontre o que precisa.</p>
    <a href="/">Voltar ao início</a>
    <footer>© Renata Druck — Psicanálise</footer>
  </body>
</html>
